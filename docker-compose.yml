# ============================================
# 统计系统 Docker Compose 编排
# ============================================
# 本编排仅启动应用容器（前端 + 后端 + Nginx）
# 数据库（MariaDB）请使用已独立搭建的实例
#
# 使用方法：
#   1. 复制 .env.example 为 .env 并配置外部 MariaDB 连接信息
#   2. docker compose up -d --build   构建并启动
#   3. docker compose logs -f app      查看日志
#   4. docker compose down             停止
# ============================================

services:
  # ---------- 应用服务（前端 + 后端 + Nginx）----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tongji-app
    restart: unless-stopped
    environment:
      # 直接使用外部 MariaDB 连接串，格式：
      #   mysql://用户名:密码@主机:端口/数据库名
      # 注意：必须使用 mysql:// 协议（Prisma CLI 不识别 mariadb://）
      # 主机填写 Docker 宿主机可访问的 MariaDB 地址：
      #   - 同宿主机 MariaDB：host.docker.internal（Docker Desktop）或 172.17.0.1（Linux）
      #   - 远程 MariaDB：填写远程服务器 IP
      DATABASE_URL: ${DATABASE_URL:-mysql://TONGji:wenny8888.@192.168.2.145:3306/TONGji}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      # 仅首次部署时设置为 1 触发会长账户初始化，后续更新部署留空或设为 0 跳过
      SEED_ADMIN: ${SEED_ADMIN:-0}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # 持久化数据库备份
      - app-backups:/app/backups
    # 如需访问宿主机的 MariaDB，添加 extra_hosts 解析 host.docker.internal
    # Linux 上 Docker 默认不支持 host.docker.internal，需通过此配置启用
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-backups:
    driver: local
