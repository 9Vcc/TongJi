# ============================================
# 统计系统 Docker Compose 编排
# ============================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并修改配置
#   2. docker compose up -d          启动
#   3. docker compose logs -f app     查看日志
#   4. docker compose down            停止
# ============================================

services:
  # ---------- MariaDB 数据库 ----------
  mariadb:
    image: mariadb:11
    container_name: tongji-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root123}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tongji}
      MARIADB_USER: ${MARIADB_USER:-tongji}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-tongji123}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tongji-net

  # ---------- 应用服务（前端 + 后端 + Nginx）----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tongji-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mariadb://${MARIADB_USER:-tongji}:${MARIADB_PASSWORD:-tongji123}@mariadb:3306/${MARIADB_DATABASE:-tongji}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # 持久化数据库备份
      - app-backups:/app/backups
    networks:
      - tongji-net

volumes:
  mariadb-data:
    driver: local
  app-backups:
    driver: local

networks:
  tongji-net:
    driver: bridge
