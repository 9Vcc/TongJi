# ============================================
# 本地开发用 Docker Compose（仅启动 MariaDB）
# ============================================
# 使用方法：
#   docker compose -f docker-compose.dev.yml up -d
#   # 启动后 MariaDB 可通过 127.0.0.1:3306 连接
#
# 数据库信息（与 server/.env 一致）：
#   数据库：tongji
#   用户名：tongji
#   密码：  tongji123
#   root密码：root123（用于测试创建/删除 tongji_test 数据库）
# ============================================

services:
  mariadb:
    image: mariadb:11
    container_name: tongji-mariadb-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: tongji
      MARIADB_USER: tongji
      MARIADB_PASSWORD: tongji123
    ports:
      - "3306:3306"
    volumes:
      - mariadb-dev-data:/var/lib/mysql

volumes:
  mariadb-dev-data:
    driver: local
