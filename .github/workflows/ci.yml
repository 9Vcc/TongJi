name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 同一分支的新推送取消正在运行的旧工作流，节省 CI 资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Lint & 类型检查
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: mysql://root:root123@127.0.0.1:3306/tongji
        run: npx prisma generate

      - name: Lint client
        run: npm run lint --prefix client

      - name: Type check server
        working-directory: server
        run: npx tsc --noEmit

  # ============================================================
  # 测试（需要 MariaDB）
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root123
          MARIADB_DATABASE: tongji_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      DATABASE_URL: mysql://root:root123@127.0.0.1:3306/tongji_test
      JWT_SECRET: test-secret-key-for-vitest-only-not-for-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run tests
        working-directory: server
        run: npm test

  # ============================================================
  # 构建
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: mysql://root:root123@127.0.0.1:3306/tongji
        run: npx prisma generate

      - name: Build
        run: npm run build
