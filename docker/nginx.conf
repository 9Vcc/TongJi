# Nginx 配置：静态前端 + API 反向代理

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # 前端静态文件
    root /app/public;
    index index.html;

    # 上传文件大小限制（与后端 multipart 一致）
    client_max_body_size 10m;

    # 关闭版本号显示，避免暴露 nginx 版本信息
    server_tokens off;

    # ====== Gzip 压缩配置 ======
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml application/wasm;

    # ====== 安全响应头 ======
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ====== HTTPS 配置模板（按需启用）======
    # 当前未启用 HTTPS，避免无证书时启动失败。如需启用，请按以下步骤操作：
    # 1. 准备证书文件 fullchain.pem 与 privkey.pem，放入容器内（如 /etc/nginx/ssl/）
    # 2. 在下方 listen 8080; 旁追加：listen 443 ssl;
    # 3. 取消注释以下 ssl 相关指令，并修正证书路径
    # 4. 如需将 HTTP 强制跳转 HTTPS，可新增一个监听 80 的 server 块做 301 跳转
    #
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    #
    # # HSTS：仅在启用 HTTPS 后生效（HTTP 下浏览器会忽略该头）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA 路由回退：所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 禁止缓存，确保用户始终获取最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 反向代理到后端 Node.js 服务
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # 静态资源长缓存（Vite 构建的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
